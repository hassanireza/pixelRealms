<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Grid</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="noise"></div>
<div class="gradient-bg"></div>

<section class="life-wrapper">

    <div class="hero-panel">

        <div class="tag">
            Adaptive Simulation Engine
        </div>

        <h1 class="life-title">
            NEURAL GRID
        </h1>

        <p class="life-subtitle">
            A futuristic reactive ecosystem where intelligent glowing cells evolve, expand, and reshape the digital grid in real time.
        </p>

        <div id="gridContainer"></div>

        <div class="controls">
            <button id="start"><span>Launch</span></button>
            <button id="clear"><span>Reset</span></button>
            <button id="random"><span>Generate</span></button>
        </div>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
